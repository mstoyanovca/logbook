<div class="container-fluid">
  <form class="mt-4" #loginForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="row mb-3">
      <div class="col-lg-2">
        <label class="form-label" for="email">Email</label>
      </div>
      <div class="col-lg-4">
        <input class="form-control form-control-sm" id="email" name="email" type="email" required [(ngModel)]="user.email">
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-lg-2">
        <label class="form-label" for="password">Password</label>
      </div>
      <div class="col-lg-4">
        <input class="form-control form-control-sm" id="password" name="password" type="password" minlength="6" maxlength="32"
               placeholder="6-32 characters" required [(ngModel)]="user.password">
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-lg-4 offset-lg-2">
        <button class="btn btn-primary btn-sm" type="submit">
          <i class="bi bi-box-arrow-in-right"></i> Login <span class="spinner-border spinner-border-sm mr-1"></span>
        </button>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-lg-4 offset-lg-2 text-end">
        <a class="btn btn-link" routerLink="../register">Register</a>
        <a class="btn btn-link" routerLink="../forgot-password">Forgot Password</a>
      </div>
    </div>
  </form>
</div>
